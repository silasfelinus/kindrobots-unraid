version: 1
project: kindrobots-unraid
objective: Publish a reliable Unraid catalog for the Kind Robots ecosystem.

phases:
  - id: foundation
    title: Catalog foundation
    status: done
    tasks:
      - id: catalog-structure
        title: Establish template, docs, catalog, and validation structure
        status: done
      - id: proxysql-template
        title: Create first ProxySQL Unraid template
        status: done
      - id: proxysql-test
        title: Install and test ProxySQL on Alexandria Unraid
        status: done
        depends_on: [proxysql-template]
        note: Verified local routing through ProxySQL to MariaDB on Alexandria.
      - id: template-validation
        title: Validate XML and catalog files in GitHub Actions
        status: done

  - id: database-resilience
    title: Database resilience
    status: active
    tasks:
      - id: configure-proxysql
        title: Configure ProxySQL users, backend hostgroup, monitoring, and limits
        status: done
        depends_on: [proxysql-test]
        note: Backend hostgroup, monitor access, application user, TLS, and connection limits are active.
      - id: switch-kind-robots
        title: Point Kind Robots DATABASE_URL at ProxySQL
        status: done
        depends_on: [configure-proxysql]
        note: Vercel production deploy passed strict TLS verification, Prisma migration checks, and database-backed runtime requests.
      - id: observe-pooling
        title: Measure frontend sessions, backend connections, latency, and failures
        status: ready
        depends_on: [switch-kind-robots]
        note: >-
          Tooling added: scripts/observe-pooling.sh + docs/observability.md.
          Still needs a live run across a real traffic cycle on Alexandria
          before this can move to done.
      - id: rate-limits
        title: Add API rate limiting, retry discipline, and idempotency for writes
        status: planned
      - id: backup-restore
        title: Automate MariaDB backups and verified restores
        status: planned

  - id: app-packaging
    title: Application packaging
    status: planned
    tasks:
      - id: portos-template
        title: Normalize PortOS into the catalog
        status: done
        note: >-
          PortOS has no app-level Dockerfile (native Node/PM2 process); only its
          optional networked Postgres+pgvector backend (PGMODE=network) is
          Unraid-packageable. Added templates/portos-postgres.xml and
          docs/portos-postgres.md.
      - id: kind-robots-template
        title: Package persistent Kind Robots Nitro/API deployment
        status: planned
      - id: conductor-template
        title: Package Conductor worker and control services
        status: planned
      - id: comfyui-template
        title: Package ComfyUI with GPU and model-volume conventions
        status: done
        note: >-
          ComfyUI has no official upstream Docker image, so
          templates/comfyui-nvidia.xml packages the community-maintained
          mmartial/comfyui-nvidia-docker image (NVIDIA-only, requires the
          Nvidia-Driver plugin). Splits state into a disposable Run
          directory (venv + ComfyUI install) and a Base Directory (models,
          custom_nodes, input, output) worth backing up. Documented in
          docs/comfyui.md. Not yet clean-install tested on real Unraid
          hardware — see publication-status note in the doc.
      - id: forge-template
        title: Package KnightForge/Forge with GPU and model-volume conventions
        status: planned
      - id: ollama-template
        title: Package Ollama in CPU and NVIDIA modes
        status: done
        note: >-
          Added templates/ollama.xml (CPU) and templates/ollama-nvidia.xml
          (--runtime=nvidia, requires the Nvidia-Driver Unraid plugin), both
          on the official ollama/ollama image. Documented in docs/ollama.md.
          Not yet clean-install tested on real Unraid hardware — see
          publication-status note in the doc.
      - id: backup-template
        title: Package Kind Backup with retention and restore checks
        status: planned

  - id: publication
    title: Community Applications publication
    status: planned
    tasks:
      - id: clean-install-tests
        title: Test every candidate on a clean Unraid installation
        status: planned
      - id: icons-and-support
        title: Add stable icons, support links, changelogs, and update policies
        status: planned
      - id: ca-compliance
        title: Validate templates against Community Applications requirements
        status: planned
      - id: ca-submit
        title: Publish eligible templates to Community Applications
        status: planned
